apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-requests-frontend
  namespace: travel-requests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-requests-frontend
  template:
    metadata:
      labels:
        app: travel-requests-frontend
    spec:
      containers:
        - name: frontend
          image: travel-requests-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: travel-requests-frontend
  namespace: travel-requests
spec:
  type: NodePort
  selector:
    app: travel-requests-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
