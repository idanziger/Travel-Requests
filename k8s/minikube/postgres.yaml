apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: travel-requests-postgres-data
  namespace: travel-requests
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-requests-postgres
  namespace: travel-requests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-requests-postgres
  template:
    metadata:
      labels:
        app: travel-requests-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: travel-requests-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: travel-requests-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travel-requests-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: travel-requests-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: travel-requests-postgres
  namespace: travel-requests
spec:
  selector:
    app: travel-requests-postgres
  ports:
    - port: 5432
      targetPort: 5432
